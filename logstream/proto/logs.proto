syntax = "proto3";

package pb;

option go_package = "logstream/pb";

// ─── Enums ───────────────────────────────────────────────────

enum LogLevel {
  DEBUG   = 0;
  INFO    = 1;
  WARNING = 2;
  ERROR   = 3;
  FATAL   = 4;
}

// ─── Core types ──────────────────────────────────────────────

message LogEntry {
  string   service_id  = 1;
  LogLevel level       = 2;
  string   message     = 3;
  int64    timestamp   = 4;  // unix milliseconds
  string   task_id     = 5;
  string   documento   = 6;  // CNPJ/CPF — presente só em batch tasks
  string   module      = 7;  // receita_service | external_service | etc.
  string   agent_id    = 8;
  string   trace_id    = 9;
  map<string, string> extra = 10;
}

message LogBatch {
  string   agent_id   = 1;
  string   service_id = 2;
  repeated LogEntry entries = 3;
  string   batch_id   = 4;
  int64    sent_at    = 5;  // unix milliseconds
}

// ─── Agent metadata ──────────────────────────────────────────

message AgentInfo {
  string agent_id   = 1;
  string service_id = 2;
  string name       = 3;
  string version    = 4;
  string hostname   = 5;
}

// ─── Service config (dashboard-controlled) ───────────────────

message ServiceConfig {
  string   service_id = 1;
  int32    ttl_days   = 2;  // default 30
  LogLevel min_level  = 3;  // default INFO
  int32    batch_size = 4;  // default 100
  int32    flush_ms   = 5;  // default 500
  bool     enabled    = 6;
}

// ─── Register ────────────────────────────────────────────────

message RegisterRequest  { AgentInfo agent = 1; }
message RegisterResponse {
  ServiceConfig config      = 1;
  int64         server_time = 2;
}

// ─── Heartbeat ───────────────────────────────────────────────

message HeartbeatRequest {
  string  agent_id      = 1;
  string  service_id    = 2;
  int64   buffer_used   = 3;
  int64   dropped_total = 4;
  float   logs_per_sec  = 5;
}
message HeartbeatResponse {
  ServiceConfig config      = 1;
  int64         server_time = 2;
}

// ─── Stream (agent → server, bidirectional) ──────────────────
// Agent sends LogBatch; server responds with StreamResponse per batch.

message StreamResponse {
  string        batch_id       = 1;
  int32         accepted       = 2;
  ServiceConfig updated_config = 3;  // optional config push
}

// ─── Subscribe (dashboard live stream) ───────────────────────

message SubscribeRequest {
  repeated string service_ids = 1;  // empty = all
  repeated string levels      = 2;  // empty = all
  string          task_id     = 3;
  string          documento   = 4;
  string          module      = 5;
  string          search      = 6;
}

// ─── Query (historical) ──────────────────────────────────────

message QueryRequest {
  repeated string service_ids = 1;
  repeated string levels      = 2;
  string          task_id     = 3;
  string          documento   = 4;
  string          module      = 5;
  string          search      = 6;
  int64           from_ts     = 7;
  int64           to_ts       = 8;
  int32           limit       = 9;
  int32           offset      = 10;
}
message QueryResponse {
  repeated LogEntry entries  = 1;
  int32             total    = 2;
  bool              has_more = 3;
}

// ─── Config update ───────────────────────────────────────────

message UpdateConfigRequest  { ServiceConfig config = 1; }
message UpdateConfigResponse { bool ok = 1; string error = 2; }

// ─── gRPC Service ────────────────────────────────────────────

service LogService {
  // Agent handshake — must be first call
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Agent sends LogBatch stream, server acks each batch
  rpc StreamLogs(stream LogBatch) returns (stream StreamResponse);

  // Agent heartbeat every 10s
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Dashboard live stream (converted to WebSocket by server gateway)
  rpc Subscribe(SubscribeRequest) returns (stream LogEntry);

  // Dashboard historical query
  rpc Query(QueryRequest) returns (QueryResponse);

  // Dashboard updates service config; server propagates to agent via heartbeat
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
}
